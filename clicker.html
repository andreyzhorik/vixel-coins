<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick Clicker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Pick Clicker</h1>
      <p class="subtitle">Click the target inside the box — it teleports after every hit.</p>

      <section class="panel">
        <p class="score">User: <span id="username">-</span></p>
        <p class="score">Coins: <span id="coins">0</span></p>
        <p class="muted-text">Coins auto-refresh every 2 seconds.</p>
      </section>

      <section class="click-zone" id="click-zone">
        <button id="click-btn" class="floating-button target-button" type="button" aria-label="Click target" tabindex="-1"></button>
      </section>

      <a class="back-link" href="index.html">← Back to Main</a>
    </main>

    <script src="app.js"></script>
    <script>
      const usernameEl = document.getElementById('username');
      const coinsEl = document.getElementById('coins');
      const clickBtn = document.getElementById('click-btn');
      const clickZone = document.getElementById('click-zone');

      let currentUser;

      function moveButtonRandom() {
        const zoneWidth = clickZone.clientWidth;
        const zoneHeight = clickZone.clientHeight;
        const btnWidth = clickBtn.offsetWidth;
        const btnHeight = clickBtn.offsetHeight;

        const maxX = Math.max(zoneWidth - btnWidth, 0);
        const maxY = Math.max(zoneHeight - btnHeight, 0);
        const x = Math.floor(Math.random() * (maxX + 1));
        const y = Math.floor(Math.random() * (maxY + 1));

        clickBtn.style.left = `${x}px`;
        clickBtn.style.top = `${y}px`;
      }

      function getClickReward(coins) {
        if (coins >= 1000) return 0.1;
        if (coins >= 100) return 0.5;
        return 1;
      }

      function roundCoins(value) {
        return Math.round(value * 10) / 10;
      }

      clickBtn.addEventListener('click', async () => {
        if (!currentUser) return;
        const currentCoins = Number(currentUser.coins || 0);
        const reward = getClickReward(currentCoins);
        const nextCoins = roundCoins(currentCoins + reward);
        currentUser = await updateCoins(currentUser.id, nextCoins);
        renderUserInfo(currentUser, usernameEl, coinsEl);
        moveButtonRandom();
      });

      window.addEventListener('resize', moveButtonRandom);


      clickBtn.addEventListener('keydown', (event) => {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault();
        }
      });


      async function init() {
        currentUser = await ensureUser(true);
        renderUserInfo(currentUser, usernameEl, coinsEl);

        startUserCoinSync(currentUser.id, (latest) => {
          currentUser = latest;
          renderUserInfo(currentUser, usernameEl, coinsEl);
        }, 2000);

        moveButtonRandom();
      }

      init();
    </script>
  </body>
</html>
