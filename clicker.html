<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick Clicker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>Pick Clicker</h1>
      <p class="subtitle">Click the target inside the box — it teleports after every hit.</p>

      <section class="panel">
        <p class="score">User: <span id="username">-</span></p>
        <p class="score">Coins: <span id="coins">0</span></p>
        <p class="score">Active Rank: <span id="active-rank">Vixel</span></p>
        <p class="score">Crystals: <span id="crystals">0</span></p>
        <p id="bonus-note" class="muted-text">Bonus: None</p>
        <p id="shop-boost-note" class="muted-text"></p>
      </section>

      <section class="click-zone" id="click-zone">
        <button id="click-btn" class="floating-button target-button" type="button" aria-label="Click target" tabindex="-1"></button>
      </section>

      <a class="back-link" href="index.html">← Back to Main</a>
    </main>

    <script src="app.js"></script>
    <script>
      const usernameEl = document.getElementById('username');
      const coinsEl = document.getElementById('coins');
      const clickBtn = document.getElementById('click-btn');
      const clickZone = document.getElementById('click-zone');
      const crystalsEl = document.getElementById('crystals');
      const activeRankEl = document.getElementById('active-rank');
      const bonusNoteEl = document.getElementById('bonus-note');
      const shopBoostNoteEl = document.getElementById('shop-boost-note');

      let currentUser;

      function renderCrystals(user) {
        crystalsEl.textContent = getUserCrystals(user);
      }

      function moveButtonRandom() {
        const zoneWidth = clickZone.clientWidth;
        const zoneHeight = clickZone.clientHeight;
        const btnWidth = clickBtn.offsetWidth;
        const btnHeight = clickBtn.offsetHeight;

        const maxX = Math.max(zoneWidth - btnWidth, 0);
        const maxY = Math.max(zoneHeight - btnHeight, 0);
        const x = Math.floor(Math.random() * (maxX + 1));
        const y = Math.floor(Math.random() * (maxY + 1));

        clickBtn.style.left = `${x}px`;
        clickBtn.style.top = `${y}px`;
      }

      function getClickReward(coins) {
        if (coins >= 1000) return 0.1;
        if (coins >= 100) return 0.5;
        return 1;
      }

      function roundCoins(value) {
        return Math.round(value * 10) / 10;
      }

      function renderActiveRank(user) {
        const rank = getActiveRank(user);
        activeRankEl.textContent = rank;
        activeRankEl.style.color = getRankColor(rank);
        bonusNoteEl.textContent = `Bonus: ${RANK_BONUSES[rank]}`;
      }

      function renderShopBoosts() {
        const active = [];
        if (isTimedEffectActive(SHOP_EFFECT_KEYS.clickBonusUntil)) active.push('Click Bonus +50%');
        if (isTimedEffectActive(SHOP_EFFECT_KEYS.coinMultiplierUntil)) active.push('Coin Multiplier +25%');
        shopBoostNoteEl.textContent = active.length ? `Shop boosts: ${active.join(' • ')}` : 'Shop boosts: none';
      }

      clickBtn.addEventListener('click', async () => {
        if (!currentUser) return;
        const currentCoins = Number(currentUser.coins || 0);
        const rank = getActiveRank(currentUser);
        const rankMultiplier = rank === 'Wynix' ? 1.05 : 1;
        const reward = getClickReward(currentCoins) * rankMultiplier * getClickShopMultiplier();
        const nextCoins = roundCoins(currentCoins + reward);
        currentUser.coins = nextCoins;
        renderUserInfo(currentUser, usernameEl, coinsEl);
        renderShopBoosts();

        const crystalChance = getActiveRank(currentUser) === 'Xivil' ? 0.10 : 0.05;
        if (Math.random() < crystalChance) {
          currentUser.crystals = getUserCrystals(currentUser) + 1;
          renderCrystals(currentUser);
        }

        updateUser(currentUser.id, currentUser).catch((error) => console.error('Failed to save clicker state:', error));

        moveButtonRandom();
      });

      window.addEventListener('resize', moveButtonRandom);


      clickBtn.addEventListener('keydown', (event) => {
        if (event.code === 'Space' || event.code === 'Enter') {
          event.preventDefault();
        }
      });



      async function init() {
        currentUser = await ensureUser(true);
        if (!currentUser) return;
        renderUserInfo(currentUser, usernameEl, coinsEl);
        renderActiveRank(currentUser);
        renderShopBoosts();
        renderCrystals(currentUser);
        applyClickerSkin(clickBtn);

        moveButtonRandom();
      }

      init();
    </script>
  </body>
</html>
